<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatNad — by Nadeem Gohar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0a0d12;
    --bg-panel:#10141b;
    --bg-panel-alt:#161c26;
    --border:#232b38;
    --border-soft:#1a212c;
    --text-primary:#dbe4ec;
    --text-muted:#5f6b7a;
    --text-dim:#3d4756;
    --amber:#e8a33d;
    --amber-dim:#8a6a2e;
    --teal:#4fb3bf;
    --teal-dim:#33707a;
    --danger:#c25b52;
    --radius:10px;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }

  *{ box-sizing:border-box; }

  html,body{
    height:100%;
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(232,163,61,0.06), transparent),
      var(--bg-void);
    color:var(--text-primary);
    font-family:var(--mono);
    -webkit-font-smoothing:antialiased;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }

  .crt-noise{
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.012) 0px,
      rgba(255,255,255,0.012) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index:50;
    opacity:.5;
  }

  .terminal{
    width:100%;
    max-width:860px;
    height:min(720px, 88vh);
    display:flex;
    flex-direction:column;
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 30px 70px -20px rgba(0,0,0,0.7),
      0 0 90px -30px rgba(232,163,61,0.08);
    overflow:hidden;
  }

  /* ---- title bar ---- */
  .titlebar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 16px;
    background:var(--bg-panel-alt);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .dots{ display:flex; gap:7px; flex-shrink:0; }
  .dot{ width:11px; height:11px; border-radius:50%; background:var(--amber); }
  .dot:nth-child(1){ opacity:1; }
  .dot:nth-child(2){ opacity:0.6; }
  .dot:nth-child(3){ opacity:0.3; }

  .titlebar-path{
    flex:1;
    text-align:center;
    font-size:12.5px;
    color:var(--text-muted);
    letter-spacing:.02em;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .titlebar-path b{ color:var(--text-primary); font-weight:600; }
  .titlebar-spacer{ width:52px; flex-shrink:0; }

  /* ---- header / masthead ---- */
  .masthead{
    padding:22px 24px 16px;
    border-bottom:1px dashed var(--border-soft);
    flex-shrink:0;
  }
  .masthead .prompt-line{
    font-size:13px;
    color:var(--teal);
    margin:0 0 10px;
  }
  .masthead .prompt-line .p{ color:var(--amber); }
  .masthead h1{
    margin:0 0 6px;
    font-size:26px;
    font-weight:800;
    letter-spacing:-.01em;
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .masthead h1 .cursor-block{
    display:inline-block;
    width:11px;
    height:20px;
    background:var(--amber);
    animation:blink 1.1s step-end infinite;
    vertical-align:text-bottom;
  }
  .masthead .subtitle{
    margin:0;
    font-size:12.5px;
    color:var(--text-muted);
    line-height:1.6;
  }
  .masthead .subtitle .author{ color:var(--amber); font-weight:600; }

  /* ---- boot log ---- */
  .bootlog{
    padding:12px 24px;
    font-size:12px;
    line-height:1.9;
    color:var(--text-dim);
    border-bottom:1px solid var(--border-soft);
    flex-shrink:0;
    max-height:0;
    overflow:hidden;
    transition:max-height .4s ease;
  }
  .bootlog.show{ max-height:220px; }
  .bootlog .ok{ color:var(--teal-dim); }
  .bootlog div{ opacity:0; animation:fadein .25s forwards; }

  /* ---- chat log ---- */
  .chatlog{
    flex:1;
    overflow-y:auto;
    padding:20px 24px;
    display:flex;
    flex-direction:column;
    gap:16px;
    scroll-behavior:smooth;
  }
  .chatlog::-webkit-scrollbar{ width:8px; }
  .chatlog::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }
  .chatlog::-webkit-scrollbar-track{ background:transparent; }

  .line{
    display:flex;
    gap:10px;
    font-size:13.5px;
    line-height:1.65;
    animation:rise .28s ease both;
  }
  .line .tag{
    flex-shrink:0;
    font-weight:700;
    user-select:none;
  }
  .line.user .tag{ color:var(--amber); }
  .line.bot .tag{ color:var(--teal); }
  .line.system .tag{ color:var(--text-dim); }
  .line .body{ color:var(--text-primary); white-space:pre-wrap; word-break:break-word; }
  .line.system .body{ color:var(--text-muted); font-style:italic; }

  .typing{
    display:flex; gap:10px; font-size:13.5px;
  }
  .typing .tag{ color:var(--teal); font-weight:700; }
  .typing .dots-anim span{
    display:inline-block; width:5px; height:5px; margin-right:3px;
    border-radius:50%; background:var(--teal-dim);
    animation:pulse 1.2s infinite ease-in-out;
  }
  .typing .dots-anim span:nth-child(2){ animation-delay:.15s; }
  .typing .dots-anim span:nth-child(3){ animation-delay:.3s; }

  /* ---- input row ---- */
  .inputbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 24px;
    border-top:1px solid var(--border);
    background:var(--bg-panel-alt);
    flex-shrink:0;
  }
  .inputbar .prompt-char{
    color:var(--amber);
    font-weight:700;
    font-size:15px;
  }
  .inputbar input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text-primary);
    font-family:var(--mono);
    font-size:14px;
    caret-color:var(--amber);
  }
  .inputbar input::placeholder{ color:var(--text-dim); }
  .inputbar button{
    background:var(--amber);
    color:#1a1305;
    border:none;
    font-family:var(--mono);
    font-weight:700;
    font-size:12.5px;
    letter-spacing:.03em;
    padding:9px 16px;
    border-radius:6px;
    cursor:pointer;
    transition:filter .15s ease, transform .05s ease;
  }
  .inputbar button:hover{ filter:brightness(1.1); }
  .inputbar button:active{ transform:scale(.97); }
  .inputbar button:disabled{ opacity:.4; cursor:default; }

  .footer-credit{
    text-align:center;
    font-size:10.5px;
    color:var(--text-dim);
    padding:8px 0 2px;
    letter-spacing:.03em;
  }
  .footer-credit b{ color:var(--text-muted); }

  @keyframes blink{ 50%{ opacity:0; } }
  @keyframes fadein{ to{ opacity:1; } }
  @keyframes rise{ from{ opacity:0; transform:translateY(4px);} to{ opacity:1; transform:translateY(0);} }
  @keyframes pulse{ 0%,60%,100%{ opacity:.25; } 30%{ opacity:1; } }

  @media (max-width:560px){
    .masthead h1{ font-size:21px; }
    .titlebar-path{ display:none; }
    .chatlog{ padding:16px; }
    .inputbar{ padding:12px 16px; }
    .masthead{ padding:18px 16px 14px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001s !important; transition-duration:0.001s !important; }
  }
</style>
</head>
<body>
<div class="crt-noise"></div>

<div class="terminal">
  <div class="titlebar">
    <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div class="titlebar-path"><b>nadeem@chatnad</b>:~$ python chatbot.py</div>
    <div class="titlebar-spacer"></div>
  </div>

  <div class="masthead">
    <p class="prompt-line"><span class="p">❯</span> whoami</p>
    <h1>ChatNad<span class="cursor-block"></span></h1>
    <p class="subtitle">An intent-classification chatbot (TF-IDF + linear SVM) built and trained by <span class="author">Nadeem Gohar</span>.</p>
  </div>

  <div class="bootlog" id="bootlog"></div>

  <div class="chatlog" id="chatlog">
    <div class="line system"><span class="tag">#</span><span class="body">Type a message below and press Enter. ChatNad falls back gracefully when it's unsure.</span></div>
  </div>

  <div class="inputbar">
    <span class="prompt-char">❯</span>
    <input id="msgInput" type="text" placeholder="say something to chatnad..." autocomplete="off" />
    <button id="sendBtn">SEND</button>
  </div>

  <div class="footer-credit">built by <b>Nadeem Gohar</b> · flask + scikit-learn</div>
</div>

<script>
  const bootLines = [
    { text: "[nltk] loading tokenizer & lemmatizer ... ", ok: "done" },
    { text: "[joblib] chatnad_vectorizer.pkl ... ", ok: "loaded" },
    { text: "[joblib] chatnad_model.pkl (SVC, linear) ... ", ok: "loaded" },
    { text: "[chatnad] intents ready — awaiting input", ok: "" },
  ];

  const bootlogEl = document.getElementById("bootlog");
  bootlogEl.classList.add("show");
  bootLines.forEach((l, i) => {
    const div = document.createElement("div");
    div.style.animationDelay = (i * 0.12) + "s";
    div.innerHTML = l.text + (l.ok ? `<span class="ok">${l.ok}</span>` : "");
    bootlogEl.appendChild(div);
  });
  setTimeout(() => { bootlogEl.style.maxHeight = "0px"; }, 2200);

  const chatlog = document.getElementById("chatlog");
  const input = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");

  function addLine(role, text) {
    const line = document.createElement("div");
    line.className = "line " + role;
    const tag = role === "user" ? "you ❯" : "chatnad ❯";
    line.innerHTML = `<span class="tag">${tag}</span><span class="body"></span>`;
    line.querySelector(".body").textContent = text;
    chatlog.appendChild(line);
    chatlog.scrollTop = chatlog.scrollHeight;
    return line;
  }

  function showTyping() {
    const t = document.createElement("div");
    t.className = "typing";
    t.id = "typingIndicator";
    t.innerHTML = `<span class="tag">chatnad ❯</span><span class="dots-anim"><span></span><span></span><span></span></span>`;
    chatlog.appendChild(t);
    chatlog.scrollTop = chatlog.scrollHeight;
  }
  function hideTyping() {
    const t = document.getElementById("typingIndicator");
    if (t) t.remove();
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    addLine("user", text);
    input.value = "";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      hideTyping();
      addLine("bot", data.reply || "...");
    } catch (err) {
      hideTyping();
      addLine("system", "connection error — is the server running?");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
  });
  window.addEventListener("load", () => input.focus());
</script>
</body>
</html>
