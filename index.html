<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatNad</title>
<style>
  :root {
    --bg: #0f1720;
    --panel: #16212c;
    --accent: #e8a33d;
    --accent-soft: rgba(232, 163, 61, 0.15);
    --text: #eef2f5;
    --text-dim: #8ba0af;
    --bubble-user: #22384a;
    --bubble-bot: #1c2933;
    --border: #23323e;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(ellipse at top, #17222d 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .app {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    height: 640px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  }

  .header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .mark {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    font-family: 'Courier New', monospace;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 15px;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .header-text p {
    margin: 2px 0 0;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    display: inline-block;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.45;
    animation: rise 0.2s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.bot {
    align-self: flex-start;
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--bubble-user);
    border-bottom-right-radius: 4px;
  }

  .typing {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  .input-row {
    display: flex;
    gap: 8px;
    padding: 14px;
    border-top: 1px solid var(--border);
  }

  .input-row input {
    flex: 1;
    background: #0f1720;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }

  .input-row input:focus {
    border-color: var(--accent);
  }

  .input-row button {
    background: var(--accent);
    border: none;
    color: #1a1206;
    font-weight: 600;
    padding: 0 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
  }

  .input-row button:hover { filter: brightness(1.08); }
  .input-row button:active { transform: scale(0.97); }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 14px 12px;
  }

  .chip {
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid transparent;
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
  }
  .chip:hover { border-color: var(--accent); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="mark">CN</div>
    <div class="header-text">
      <h1>ChatNad</h1>
      <p><span class="dot"></span> ML-powered assistant</p>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">Hey, I'm ChatNad — a chatbot trained with TF-IDF + SVM intent classification. Ask me anything from the suggestions below, or just say hi.</div>
  </div>

  <div class="suggestions" id="suggestions">
    <div class="chip" onclick="sendSuggested('Who are you?')">Who are you?</div>
    <div class="chip" onclick="sendSuggested('Tell me a joke')">Tell me a joke</div>
    <div class="chip" onclick="sendSuggested('Who made you?')">Who made you?</div>
  </div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    inputEl.value = '';
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.reply, 'bot');
    } catch (err) {
      hideTyping();
      addMessage("Something went wrong reaching the server. Is app.py running?", 'bot');
    }
  }

  function sendSuggested(text) {
    inputEl.value = text;
    sendMessage();
  }

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>

</body>
</html>
